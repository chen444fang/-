<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>日志解析看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css"/>
</head>
<body class="bg-gray-100 p-4 flex">
  <div class="flex-1 mr-4 flex flex-col">
    <textarea id="logInput" class="border rounded p-2 mb-2 w-full" rows="6" placeholder="粘贴日志文本..."></textarea>
    <input id="filter" type="text" class="border rounded p-2 mb-2 w-full" placeholder="过滤：接口 / 用户ID / LOGID"/>
    <div class="overflow-auto flex-1">
      <table id="logTable" class="min-w-full divide-y divide-gray-200 text-sm"></table>
    </div>
  </div>
  <div id="detailPanel" class="w-1/3 bg-white border rounded p-2 hidden flex flex-col">
    <h2 class="text-lg font-bold mb-2">请求 JSON</h2>
    <pre class="bg-gray-50 p-2 rounded overflow-auto"><code id="reqJson" class="language-json"></code></pre>
    <h2 class="text-lg font-bold mt-4 mb-2">响应 JSON</h2>
    <pre class="bg-gray-50 p-2 rounded overflow-auto"><code id="resJson" class="language-json"></code></pre>
  </div>
  <script src="script.js"></script>
</body>
</html>
